name: CI/CD Pipeline to Vercel Web App

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches:
      - main
  workflow_dispatch:

env:
  # APPLICATION_PUBLISH_PROFILE: ${{ secrets.APP_PUBLISH_PROFILE  }}
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
  WEBAPP_NAME: "ampfs-udc"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22.x"
      - name: Install dependencies
        run: npm install
      - name: Build
        run: npm run build
      - name: Prepare build artifacts
        run: |
          mv ./build/static ./build/standalone/build
          mv ./public ./build/standalone
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts
          path: ./build/standalone

  test:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22.x"
      - name: Install dependencies
        run: npm install
      - name: Run tests
        run: npm test

  deploy:
    needs: [build, test]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - name: Install vercerl CLI
        run: npm install -g vercel@latest
      - name: Pull Vercel Information
        run: vercel pull --yes --environment=production --token ${{ secrets.VERCEL_TOKEN }} --org-id ${{ env.VERCEL_ORG_ID }} --project-id ${{ env.VERCEL_PROJECT_ID }}
      - name: Build Project Artifacts
        run: vercel build --prod --token ${{ secrets.VERCEL_TOKEN }}
      - name: Deploy to Vercel
        run: vercel deploy --prebuilt --prod --token ${{ secrets.VERCEL_TOKEN }} --org-id ${{ env.VERCEL_ORG_ID }} --project-id ${{ env.VERCEL_PROJECT_ID }}